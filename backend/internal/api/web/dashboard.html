<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TraceDeck Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --surface: #ffffff;
      --ink: #1d2430;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #1f7a8c;
      --risk: #b42318;
      --ok: #027a48;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 24px auto;
      display: grid;
      gap: 18px;
    }
    h1, h2, p { margin: 0; }
    h1 { font-size: 20px; font-weight: 700; }
    h2 { font-size: 15px; font-weight: 700; }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .panel, .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 26px;
      line-height: 1;
    }
    .row {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      padding: 10px 8px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f4fbf8;
      color: var(--ok);
      font-weight: 700;
      white-space: nowrap;
    }
    .tag {
      display: inline-flex;
      margin: 4px 6px 0 0;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #fbfcfe;
    }
    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; }
      .grid, .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>TraceDeck</h1>
      <p class="muted">Endpoint productivity and risk observability</p>
    </div>
    <span class="status">Local backend online</span>
  </header>
  <main>
    <section class="grid" aria-label="dashboard metrics">
      <div class="metric"><span class="muted">Devices</span><strong id="device-count">0</strong></div>
      <div class="metric"><span class="muted">Policy Templates</span><strong id="template-count">0</strong></div>
      <div class="metric"><span class="muted">Archive Backlog</span><strong id="archive-backlog">0</strong></div>
      <div class="metric"><span class="muted">API Status</span><strong id="api-status">...</strong></div>
    </section>
    <section class="row">
      <div class="panel">
        <h2>Enrolled Devices</h2>
        <table>
          <thead><tr><th>Device</th><th>Tenant</th><th>Profile</th><th>Last Seen</th></tr></thead>
          <tbody id="device-table"><tr><td colspan="4" class="muted">No devices enrolled yet.</td></tr></tbody>
        </table>
      </div>
      <div class="panel">
        <h2>Policy Templates</h2>
        <div id="template-list" class="muted">Loading templates...</div>
      </div>
    </section>
  </main>
  <script>
    async function loadJSON(path) {
      const response = await fetch(path);
      if (!response.ok) throw new Error(path + " failed");
      return response.json();
    }

    function text(value) {
      return value || "-";
    }

    function escapeHTML(value) {
      return text(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    async function refresh() {
      const [health, devices, templates, archive] = await Promise.all([
        loadJSON("/health"),
        loadJSON("/api/v1/devices"),
        loadJSON("/api/v1/policy-templates"),
        loadJSON("/api/v1/archive/status")
      ]);

      document.getElementById("api-status").textContent = health.status;
      document.getElementById("device-count").textContent = devices.count;
      document.getElementById("template-count").textContent = templates.count;
      document.getElementById("archive-backlog").textContent = archive.pending_batches;

      const deviceTable = document.getElementById("device-table");
      if (devices.count === 0) {
        deviceTable.innerHTML = '<tr><td colspan="4" class="muted">No devices enrolled yet.</td></tr>';
      } else {
        deviceTable.innerHTML = devices.items.map((device) =>
          `<tr><td>${escapeHTML(device.device_id)}</td><td>${escapeHTML(device.tenant_id)}</td><td>${escapeHTML(device.profile)}</td><td>${escapeHTML(device.last_seen_at)}</td></tr>`
        ).join("");
      }

      document.getElementById("template-list").innerHTML = templates.items.map((template) =>
        `<p><strong>${escapeHTML(template.name)}</strong><br><span class="muted">${escapeHTML(template.description)}</span><br>${template.roles.map((role) => `<span class="tag">${escapeHTML(role)}</span>`).join("")}</p>`
      ).join("");
    }

    refresh().catch(() => {
      document.getElementById("api-status").textContent = "error";
    });
  </script>
</body>
</html>
